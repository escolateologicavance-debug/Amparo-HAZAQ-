<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amparo HAZAQ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" sizes="192x192" href="logo-192.png">
    <link rel="apple-touch-icon" href="logo-192.png">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', sans-serif; margin: 0; 
               display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .logo-container { margin-bottom: 20px; }
        .logo-container img { width: 150px; border-radius: 20%; border: 2px solid #d4af37; }
        h1 { font-size: 2.2rem; margin: 10px 0; letter-spacing: 2px; }
        p { color: #d4af37; font-style: italic; margin-bottom: 30px; }
        .btn-entrar { background-color: #d4af37; color: #000; border: none; padding: 15px 40px; 
                     font-weight: bold; text-decoration: none; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo-512.png" alt="Logo Amparo HAZAQ">
    </div>
    <h1>AMPARO HAZAQ</h1>
    <p>"Fortalecidos para Fortalecer"</p>
    
    <a href="1.html" class="btn-entrar">Acessar Painel</a>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Serviço de Amparo Ativo!"))
            .catch(err => console.log("Erro ao registrar Amparo:", err));
        }
    </script>
</body>
</html>
